pre-commit:
  parallel: false
  commands:
    format:
      glob: "*.{ts,tsx,astro,js,mjs,cjs,json,jsonc,css,md}"
      run: npx prettier --write {staged_files}
      stage_fixed: true
    lint:
      glob: "*.{ts,tsx,astro,js,mjs}"
      run: npx eslint {staged_files}
    check:
      run: npx astro check
